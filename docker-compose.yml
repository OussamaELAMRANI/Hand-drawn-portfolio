services:
  postgres:
    image: postgres:16-alpine
    container_name: larevo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-larevo}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-larevo}']
      interval: 5s
      timeout: 5s
      retries: 10

  # catches all mail sent in dev instead of delivering it — web UI to inspect
  # what got "sent" at http://localhost:1080
  mailcatcher:
    image: schickling/mailcatcher
    container_name: larevo-mailcatcher
    restart: unless-stopped
    ports:
      - '${MAILCATCHER_SMTP_PORT:-1025}:1025'
      - '${MAILCATCHER_WEB_PORT:-1080}:1080'

volumes:
  pgdata:
